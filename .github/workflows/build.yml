name: Cross-Platform Build
on: [push]

jobs:
  # --- СБОРКА WINDOWS (.EXE) ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtshadertools'
          install-deps: 'true'

      - name: Build
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
          cmake --build build --config Release

      - name: Package Windows
        shell: pwsh
        run: |
          $deployTool = "$env:Qt6_DIR/bin/windeployqt.exe"
          & $deployTool --qmldir . build/Release/appkursach.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Windows
          path: build/Release/

  # --- СБОРКА ANDROID (.APK) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # КРИТИЧНО: Gradle в Qt 6.4.2 требует Java 11. 
      # Без этого шага сборка APK упадет с ошибкой (Error 2).
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Принимаем лицензии Android SDK, иначе сборка прервется
      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      # 1. Устанавливаем Desktop версию (для инструментов хоста: moc, qsb)
      - name: Install Host Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtshadertools'

      # 2. Устанавливаем Android версию (библиотеки)
      - name: Install Android Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia qtshadertools'

      - name: Build APK
        run: |
          # 1. Рассчитываем пути
          export HOST_QT_PATH=$(dirname $Qt6_DIR)/gcc_64
          export TOOLCHAIN=$Qt6_DIR/lib/cmake/Qt6/qt.toolchain.cmake
          
          echo "Using HOST_QT_PATH: $HOST_QT_PATH"
          echo "Using TOOLCHAIN: $TOOLCHAIN"

          # 2. Конфигурируем проект под Android
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN \
            -DQT_HOST_PATH=$HOST_QT_PATH \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
            
          # 3. Сборка пакета
          cmake --build build --target apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Android
          # Маска для поиска всех сгенерированных .apk файлов
          path: build/**/*.apk
