name: Cross-Platform Build
on: [push]

jobs:
  # --- СБОРКА WINDOWS (.EXE) ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtshadertools' # Исправленное название модуля
          install-deps: 'true'

      - name: Build
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
          cmake --build build --config Release

      - name: Package Windows
        shell: pwsh
        run: |
          # Собираем все DLL в одну папку
          $deployTool = "$env:Qt6_DIR/bin/windeployqt.exe"
          & $deployTool --qmldir . build/Release/appkursach.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Windows
          path: build/Release/

  # --- СБОРКА ANDROID (.APK) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Принимаем лицензии Android
      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 5. Удаляем проблемный API 36 из SDK сервера GitHub
      - name: Force API 34
        run: |
          # Удаляем ВООБЩЕ ВСЕ платформы из SDK
          rm -rf $ANDROID_HOME/platforms/*
          # Ставим ТОЛЬКО API 34
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"
          # Проверяем, что в папке осталась ТОЛЬКО одна папка android-34
          ls $ANDROID_HOME/platforms
        
      # 2. КРИТИЧНО: Java 11 для Gradle 7.4 (Qt 6.4.2)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Устанавливаем Host Qt (инструменты)
      - name: Install Host Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtshadertools'

      # 4. Устанавливаем Android Qt (библиотеки)
      - name: Install Android Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia qtshadertools'
          


      - name: Build APK
        run: |
          export NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | tail -1)
          export HOST_QT_PATH=$(dirname $Qt6_DIR)/gcc_64
          export TOOLCHAIN=$Qt6_DIR/lib/cmake/Qt6/qt.toolchain.cmake

          # Явно заставляем androiddeployqt использовать 34 через переменные среды
          export ANDROID_SDK_COMPILE_SDK_VERSION=34
          export ANDROID_SDK_TARGET_SDK_VERSION=34

          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN \
            -DQT_HOST_PATH=$HOST_QT_PATH \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON \
            -DQT_ANDROID_API_VERSION=34 \
            -DQT_ANDROID_COMPILE_SDK_VERSION=34 \
            -DQT_ANDROID_TARGET_SDK_VERSION=34 \
            -DANDROID_SDK_ROOT=$ANDROID_HOME \
            -DANDROID_NDK_ROOT=$NDK_PATH
            -DANDROID_PLATFORM=android-34 # Добавьте это!
            
          cmake --build build --target apk
          
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Android
          path: build/**/*.apk
