name: Cross-Platform Build
on: [push]

jobs:
  # --- СБОРКА WINDOWS (.EXE) ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          arch: 'win64_msvc2019_64'
          # В 6.4.2 модуль называется qtshadertools
          modules: 'qtmultimedia qtshadertools'
          install-deps: 'true'

      - name: Build
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
          cmake --build build --config Release

      - name: Package Windows
        shell: pwsh
        run: |
          $deployTool = "$env:Qt6_DIR/bin/windeployqt.exe"
          & $deployTool --qmldir . build/Release/appkursach.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Windows
          path: build/Release/

  # --- СБОРКА ANDROID (.APK) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Устанавливаем Desktop версию (для инструментов хоста: moc, qsb)
      - name: Install Host Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtshadertools'

      # 2. Устанавливаем Android версию (сами библиотеки)
      - name: Install Android Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia qtshadertools'

      - name: Build APK
        run: |
          # 1. Рассчитываем пути
          export HOST_QT_PATH=$(dirname $Qt6_DIR)/gcc_64
          # Путь к тулчейну внутри установленного Android Qt
          export TOOLCHAIN=$Qt6_DIR/lib/cmake/Qt6/qt.toolchain.cmake
          
          echo "Using HOST_QT_PATH: $HOST_QT_PATH"
          echo "Using TOOLCHAIN: $TOOLCHAIN"

          # 2. Конфигурируем с явным указанием тулчейна
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN \
            -DQT_HOST_PATH=$HOST_QT_PATH \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
            
          # 3. Теперь цель 'apk' появится
          cmake --build build --target apk
          
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Android
          # Ищем APK рекурсивно в папке сборки
          path: build/**/*.apk
