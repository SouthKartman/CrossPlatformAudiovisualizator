name: Cross-Platform Build
on: [push]

jobs:
  # --- СБОРКА WINDOWS (.EXE) ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtshadertools'
          install-deps: 'true'

      - name: Build
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
          cmake --build build --config Release

      - name: Package Windows
        shell: pwsh
        run: |
          $deployTool = "$env:Qt6_DIR/bin/windeployqt.exe"
          & $deployTool --qmldir . build/Release/appkursach.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Windows
          path: build/Release/

  # --- СБОРКА ANDROID (.APK) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Force API 34
        run: |
          rm -rf $ANDROID_HOME/platforms/*
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"
        
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Host Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtshadertools'

      - name: Install Android Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia qtshadertools'

      - name: Build APK
        run: |
          export NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | tail -1)
          export HOST_QT_PATH=$(dirname $Qt6_DIR)/gcc_64
          export TOOLCHAIN=$Qt6_DIR/lib/cmake/Qt6/qt.toolchain.cmake
          export ANDROID_SDK_COMPILE_SDK_VERSION=34
          export ANDROID_SDK_TARGET_SDK_VERSION=34

          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN \
            -DQT_HOST_PATH=$HOST_QT_PATH \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON \
            -DQT_ANDROID_API_VERSION=34 \
            -DANDROID_SDK_ROOT=$ANDROID_HOME \
            -DANDROID_NDK_ROOT=$NDK_PATH \
            -DANDROID_PLATFORM=android-34
            
          cmake --build build --target apk
          
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visualizer-Android
          path: build/**/*.apk

  # --- ПУБЛИКАЦИЯ В RELEASES ---
  publish:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Visualizer-Windows
          path: ./windows-build

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: Visualizer-Android
          path: ./android-build

      - name: Zip Windows Build
        run: zip -r windows_release.zip ./windows-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows_release.zip
            android-build/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
